services:
  postgres:
    image: postgres:16-alpine
    container_name: vale-postgres
    environment:
      POSTGRES_USER: vale
      POSTGRES_PASSWORD: vale
      POSTGRES_DB: vale_project
    ports:
      - '5432:5432'
    volumes:
      - vale-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vale -d vale_project']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vale_test
      POSTGRES_PASSWORD: vale_test
      POSTGRES_DB: vale_project_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vale_test -d vale_project_test']
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  vale-postgres-data:
