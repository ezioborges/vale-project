services:
  postgres:
    image: postgres:16-alpine
    container_name: vale-postgres
    environment:
      POSTGRES_USER: vale
      POSTGRES_PASSWORD: vale
      POSTGRES_DB: vale_project
    ports:
      - '5432:5432'
    volumes:
      - vale-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vale -d vale_project']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vale-postgres-data:
